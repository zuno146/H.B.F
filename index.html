<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Father</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg, #0f172a, #1e3a8a);
    font-family:Georgia, serif;
}

.card{
    width:700px;
    max-width:90%;
    background:white;
    padding:50px;
    text-align:center;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    border:4px solid #d4af37;
}

h1{
    font-size:3rem;
    color:#1e3a8a;
    margin-bottom:15px;
}

h2{
    font-size:1.5rem;
    color:#555;
    font-style:italic;
    margin-bottom:35px;
}

h3{
    font-size:1.4rem;
    color:#333;
    margin:10px 0;
}

.from{
    margin-top:30px;
    color:#d4af37;
    font-weight:bold;
    font-size:1.5rem;
}

.line{
    width:120px;
    height:3px;
    background:#d4af37;
    margin:25px auto;
}
</style>

</head>
<body>

<div class="card">
    <h1>🎂 Happy Birthday Daddy 🎂</h1>

    <div class="line"></div>

    <h2>Celebrating the Wonderful Father You Are</h2>

    <h3>To My Lovely Dad</h3>

    <div class="line"></div>

    <h3 class="from">With Love,<br>Zunaira ❤️</h3>
</div>
</body>
</html>
